services:
  postgres:
    image: postgres:17-alpine
    container_name: ichse-postgres
    environment:
      POSTGRES_USER: ichse
      POSTGRES_PASSWORD: ichse_dev
      POSTGRES_DB: ichse
    ports:
      - "5433:5432"
    volumes:
      - ./pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ichse"]
      interval: 5s
      timeout: 5s
      retries: 5

  postgrest:
    image: postgrest/postgrest
    container_name: ichse-postgrest
    ports:
      - "3001:3000"
    environment:
      PGRST_DB_URI: postgres://ichse:ichse_dev@postgres:5432/ichse
      PGRST_DB_SCHEMA: ichse
      PGRST_DB_ANON_ROLE: web_anon
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
