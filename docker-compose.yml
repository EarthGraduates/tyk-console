services:
  redis:
    image: redis:7.4-alpine
    container_name: ichse-redis
    ports:
      - "6380:6379"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  postgres:
    image: postgres:17-alpine
    container_name: ichse-postgres
    command: >
      postgres
      -c app.jwt_secret=${PGRST_JWT_SECRET:-dev-jwt-secret-change-in-production}
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ichse}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ichse_dev}
      POSTGRES_DB: ${POSTGRES_DB:-ichse}
    ports:
      - "5433:5432"
    volumes:
      - ./pgdata:/var/lib/postgresql/data
      - ./database/postgresql/init:/docker-entrypoint-initdb.d
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ichse"]
      interval: 5s
      timeout: 5s
      retries: 5

  postgrest:
    image: postgrest/postgrest
    container_name: ichse-postgrest
    ports:
      - "3001:3000"
    environment:
      PGRST_DB_URI: postgres://${POSTGRES_USER:-ichse}:${POSTGRES_PASSWORD:-ichse_dev}@postgres:5432/${POSTGRES_DB:-ichse}
      PGRST_DB_SCHEMA: ichse
      PGRST_DB_ANON_ROLE: web_anon
      PGRST_JWT_SECRET: ${PGRST_JWT_SECRET:-dev-jwt-secret-change-in-production}
      PGRST_DB_PRE_REQUEST: ichse.db_pre_request
      PGRST_DB_CACHE_ENABLED: "false"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
