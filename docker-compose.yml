# PostgreSQL for ichse-asset-share-center
services:
  postgres:
    image: postgres:17-alpine
    container_name: ichse-postgres
    environment:
      POSTGRES_USER: ichse
      POSTGRES_PASSWORD: ichse_dev
      POSTGRES_DB: ichse
    ports:
      - "5433:5432"
    volumes:
      - ./pgdata:/var/lib/postgresql/data
    restart: unless-stopped
